<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aashan ERP Offline</title>
    <style>
      body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#f4f7fb;color:#0f172a;display:grid;place-items:center;min-height:100vh;padding:24px}.card{max-width:460px;background:#fff;border-radius:22px;padding:28px;box-shadow:0 18px 50px rgba(15,23,42,.12);text-align:center}.logo{width:84px;height:84px;border-radius:18px;margin-bottom:12px}h1{margin:8px 0 10px;font-size:28px}p{line-height:1.55;color:#475569}.btn{display:inline-block;margin-top:16px;background:#2563eb;color:white;text-decoration:none;border-radius:14px;padding:12px 18px;font-weight:800}
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/icon-192.png" class="logo" alt="Aashan ERP" />
      <h1>You are offline</h1>
      <p>Aashan ERP is installed, but this screen needs internet to sync live ERP data. Please reconnect and try again.</p>
      <a class="btn" href="/">Try Again</a>
    </div>
  </body>
</html>
